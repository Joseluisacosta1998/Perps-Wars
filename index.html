<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Perp Wars — HYPE · ASTER · LIT</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" />
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #0B0E14;
    color: #E8EAED;
    font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.45} }
  input::placeholder { color: #5A6472; }
  button { cursor: pointer; }
  a { text-decoration: none; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<script type="text/babel" data-type="module">
const { useState, useEffect, useRef, useCallback } = React;

// ---- Token registry -------------------------------------------------
const TOKENS = [
  {
    id: "hyperliquid",
    symbol: "HYPE",
    name: "Hyperliquid",
    accent: "#2DE0C6",
    catalyst:
      "Desbloqueo de ~9.9M tokens (~$630M) previsto para el 6 de julio de 2026: puede presionar el precio a la baja.",
  },
  {
    id: "aster-2",
    symbol: "ASTER",
    name: "Aster",
    accent: "#FF5C8D",
    catalyst:
      "Bajo presión por críticas de venta interna y opacidad en recompras; un analista mantiene un objetivo alcista de largo plazo.",
  },
  {
    id: "lighter",
    symbol: "LIT",
    name: "Lighter",
    accent: "#FFB020",
    catalyst:
      "El protocolo quema tokens recomprados y financia staking desde la reserva del ecosistema: señal tokenómica favorable.",
  },
];

const IDS = TOKENS.map((t) => t.id).join(",");
const API_URL = `https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${IDS}&sparkline=true&price_change_percentage=24h`;
const REFRESH_MS = 60000;

const NEWS_LINKS = [
  { label: "CoinDesk", url: "https://www.coindesk.com/" },
  { label: "The Block", url: "https://www.theblock.co/" },
  { label: "DeFiLlama · Perps", url: "https://defillama.com/perps" },
  { label: "CoinGecko · Perpetuals", url: "https://www.coingecko.com/en/categories/decentralized-perpetuals" },
  { label: "TradingView", url: "https://www.tradingview.com/" },
  { label: "@HyperliquidX", url: "https://x.com/HyperliquidX" },
  { label: "@Aster_DEX", url: "https://x.com/Aster_DEX" },
];

function fmtPrice(n) {
  if (n == null) return "—";
  if (n >= 100) return n.toLocaleString("es-ES", { maximumFractionDigits: 2 });
  if (n >= 1) return n.toLocaleString("es-ES", { maximumFractionDigits: 3 });
  return n.toLocaleString("es-ES", { maximumFractionDigits: 5 });
}

function fmtCompact(n) {
  if (n == null) return "—";
  if (n >= 1e9) return (n / 1e9).toFixed(2) + "B";
  if (n >= 1e6) return (n / 1e6).toFixed(2) + "M";
  if (n >= 1e3) return (n / 1e3).toFixed(1) + "K";
  return n.toString();
}

function Sparkline({ points, color }) {
  if (!points || points.length < 2) return <div style={{ height: 46 }} />;
  const w = 240, h = 46, pad = 3;
  const min = Math.min(...points), max = Math.max(...points);
  const span = max - min || 1;
  const step = (w - pad * 2) / (points.length - 1);
  const d = points
    .map((p, i) => {
      const x = pad + i * step;
      const y = h - pad - ((p - min) / span) * (h - pad * 2);
      return `${i === 0 ? "M" : "L"}${x.toFixed(1)},${y.toFixed(1)}`;
    })
    .join(" ");
  const last = points[points.length - 1];
  const lastY = h - pad - ((last - min) / span) * (h - pad * 2);
  return (
    <svg width="100%" viewBox={`0 0 ${w} ${h}`} style={{ display: "block" }}>
      <path d={d} fill="none" stroke={color} strokeWidth="1.6" opacity="0.9" />
      <circle cx={w - pad} cy={lastY} r="2.4" fill={color} />
    </svg>
  );
}

function Track({ tokens, data }) {
  const changes = tokens.map((t) => data[t.id]?.price_change_percentage_24h ?? 0);
  const min = Math.min(-5, ...changes);
  const max = Math.max(5, ...changes);
  const span = max - min || 1;
  return (
    <div style={styles.track}>
      <div style={styles.trackLabelRow}>
        <span style={styles.trackLabel}>{min.toFixed(1)}%</span>
        <span style={{ ...styles.trackLabel, opacity: 0.4 }}>24h</span>
        <span style={styles.trackLabel}>{max.toFixed(1)}%</span>
      </div>
      <div style={styles.trackLane}>
        <div style={styles.trackZero} />
        {tokens.map((t) => {
          const chg = data[t.id]?.price_change_percentage_24h ?? 0;
          const pct = ((chg - min) / span) * 100;
          return (
            <div
              key={t.id}
              title={`${t.symbol} ${chg.toFixed(2)}%`}
              style={{
                ...styles.trackMarker,
                left: `${pct}%`,
                background: t.accent,
                boxShadow: `0 0 12px ${t.accent}88`,
              }}
            >
              {t.symbol}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function Dashboard() {
  const [data, setData] = useState({});
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [lastUpdated, setLastUpdated] = useState(null);
  const [alerts, setAlerts] = useState(
    Object.fromEntries(TOKENS.map((t) => [t.id, { enabled: false, dir: "above", target: "" }]))
  );
  const [triggered, setTriggered] = useState({});
  const timerRef = useRef(null);

  const load = useCallback(async () => {
    try {
      setError(null);
      const res = await fetch(API_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      const byId = {};
      json.forEach((c) => {
        byId[c.id] = {
          price: c.current_price,
          price_change_percentage_24h: c.price_change_percentage_24h,
          market_cap: c.market_cap,
          total_volume: c.total_volume,
          sparkline: c.sparkline_in_7d?.price,
        };
      });
      setData(byId);
      setLastUpdated(new Date());
    } catch (e) {
      setError("No se pudo conectar con la API en este momento. Reintentando…");
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => {
    load();
    timerRef.current = setInterval(load, REFRESH_MS);
    return () => clearInterval(timerRef.current);
  }, [load]);

  useEffect(() => {
    const next = {};
    TOKENS.forEach((t) => {
      const a = alerts[t.id];
      const price = data[t.id]?.price;
      if (a?.enabled && a.target !== "" && price != null) {
        const target = parseFloat(a.target);
        if (!isNaN(target)) {
          next[t.id] = a.dir === "above" ? price >= target : price <= target;
        }
      }
    });
    setTriggered(next);
  }, [data, alerts]);

  const updateAlert = (id, patch) =>
    setAlerts((prev) => ({ ...prev, [id]: { ...prev[id], ...patch } }));

  return (
    <div style={styles.page}>
      <header style={styles.header}>
        <div>
          <div style={styles.eyebrow}>DEX PERPETUOS · MONITOR EN VIVO</div>
          <h1 style={styles.title}>Perp Wars</h1>
          <div style={styles.subtitle}>HYPE · ASTER · LIT — la misma carrera, tres fichas</div>
        </div>
        <div style={styles.headerRight}>
          <div style={styles.updatedText}>
            {lastUpdated ? `Actualizado ${lastUpdated.toLocaleTimeString("es-ES")}` : "Cargando…"}
          </div>
          <button onClick={load} style={styles.refreshBtn}>↻ Actualizar</button>
        </div>
      </header>

      {error && <div style={styles.errorBanner}>{error}</div>}

      <Track tokens={TOKENS} data={data} />

      <div style={styles.grid}>
        {TOKENS.map((t) => {
          const d = data[t.id] || {};
          const chg = d.price_change_percentage_24h;
          const up = chg >= 0;
          const isTriggered = triggered[t.id];
          return (
            <div
              key={t.id}
              style={{
                ...styles.card,
                borderColor: isTriggered ? t.accent : "#1C2230",
                animation: isTriggered ? "pulse 1.1s ease-in-out infinite" : "none",
              }}
            >
              <div style={styles.cardTop}>
                <div>
                  <div style={{ ...styles.symbol, color: t.accent }}>{t.symbol}</div>
                  <div style={styles.name}>{t.name}</div>
                </div>
                <div style={styles.priceBlock}>
                  <div style={styles.price}>{loading ? "…" : `$${fmtPrice(d.price)}`}</div>
                  <div style={{ color: up ? "#3DDC97" : "#FF6B6B", fontWeight: 600 }}>
                    {chg != null ? `${up ? "+" : ""}${chg.toFixed(2)}%` : "—"}
                  </div>
                </div>
              </div>

              <Sparkline points={d.sparkline} color={t.accent} />

              <div style={styles.statsRow}>
                <div>
                  <div style={styles.statLabel}>Cap. mercado</div>
                  <div style={styles.statValue}>${fmtCompact(d.market_cap)}</div>
                </div>
                <div>
                  <div style={styles.statLabel}>Vol. 24h</div>
                  <div style={styles.statValue}>${fmtCompact(d.total_volume)}</div>
                </div>
              </div>

              <div style={styles.catalyst}>
                <span style={{ color: t.accent }}>◆ </span>
                {t.catalyst}
              </div>

              <div style={styles.alertBox}>
                <div style={styles.alertRow}>
                  <label style={styles.alertToggle}>
                    <input
                      type="checkbox"
                      checked={alerts[t.id].enabled}
                      onChange={(e) => updateAlert(t.id, { enabled: e.target.checked })}
                    />
                    Alerta
                  </label>
                  <select
                    value={alerts[t.id].dir}
                    onChange={(e) => updateAlert(t.id, { dir: e.target.value })}
                    style={styles.select}
                  >
                    <option value="above">≥</option>
                    <option value="below">≤</option>
                  </select>
                  <input
                    type="number"
                    placeholder="precio USD"
                    value={alerts[t.id].target}
                    onChange={(e) => updateAlert(t.id, { target: e.target.value })}
                    style={styles.numInput}
                  />
                </div>
                {isTriggered && (
                  <div style={{ ...styles.alertFired, color: t.accent }}>
                    ⚠ Umbral alcanzado — revisa {t.symbol}
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>

      <div style={styles.footerGrid}>
        <div style={styles.linksCard}>
          <div style={styles.cardHeading}>Fuentes para profundizar</div>
          <div style={styles.linksList}>
            {NEWS_LINKS.map((l) => (
              <a key={l.url} href={l.url} target="_blank" rel="noreferrer" style={styles.link}>
                {l.label} ↗
              </a>
            ))}
          </div>
        </div>
        <div style={styles.noteCard}>
          <div style={styles.cardHeading}>Cómo leer este panel</div>
          <p style={styles.note}>
            La pista superior compara el cambio de 24h de los tres tokens en la misma escala: quien va más a la derecha, gana el día.
            Las alertas viven solo en esta sesión — si cierras la pestaña se pierden. Los precios llegan de la API pública de CoinGecko
            y se refrescan cada 60 segundos.
          </p>
        </div>
      </div>
    </div>
  );
}

const styles = {
  page: { minHeight: "100vh", padding: "28px 20px 40px", boxSizing: "border-box" },
  header: { display: "flex", justifyContent: "space-between", alignItems: "flex-end", flexWrap: "wrap", gap: 12, marginBottom: 22 },
  eyebrow: { fontSize: 11, letterSpacing: "0.14em", color: "#6B7686" },
  title: { fontFamily: "'Space Grotesk', ui-sans-serif, sans-serif", fontSize: 34, fontWeight: 700, margin: "4px 0 2px", letterSpacing: "-0.01em" },
  subtitle: { color: "#8A93A3", fontSize: 13 },
  headerRight: { textAlign: "right" },
  updatedText: { fontSize: 11, color: "#6B7686", marginBottom: 6 },
  refreshBtn: { background: "#151A24", border: "1px solid #262E3D", color: "#E8EAED", borderRadius: 6, padding: "6px 12px", fontFamily: "inherit", fontSize: 12 },
  errorBanner: { background: "#3B1520", border: "1px solid #5C2233", color: "#FFB4C0", padding: "8px 14px", borderRadius: 8, fontSize: 12, marginBottom: 16 },
  track: { background: "#10141C", border: "1px solid #1C2230", borderRadius: 12, padding: "16px 18px 20px", marginBottom: 22 },
  trackLabelRow: { display: "flex", justifyContent: "space-between", fontSize: 10, color: "#6B7686", marginBottom: 10, letterSpacing: "0.05em" },
  trackLabel: {},
  trackLane: { position: "relative", height: 40, background: "repeating-linear-gradient(90deg, #161C27 0, #161C27 1px, transparent 1px, transparent 40px)", borderTop: "1px solid #1C2230", borderBottom: "1px solid #1C2230" },
  trackZero: { position: "absolute", left: "50%", top: 0, bottom: 0, width: 1, background: "#262E3D" },
  trackMarker: { position: "absolute", top: "50%", transform: "translate(-50%,-50%)", fontSize: 10, fontWeight: 700, color: "#0B0E14", padding: "4px 7px", borderRadius: 20, transition: "left 0.6s ease", whiteSpace: "nowrap" },
  grid: { display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(270px, 1fr))", gap: 16, marginBottom: 22 },
  card: { background: "#10141C", border: "1px solid #1C2230", borderRadius: 12, padding: 16, transition: "border-color 0.3s ease" },
  cardTop: { display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 },
  symbol: { fontSize: 18, fontWeight: 700, fontFamily: "'Space Grotesk', sans-serif" },
  name: { fontSize: 11, color: "#6B7686" },
  priceBlock: { textAlign: "right" },
  price: { fontSize: 18, fontWeight: 600 },
  statsRow: { display: "flex", justifyContent: "space-between", marginTop: 10, paddingTop: 10, borderTop: "1px solid #1C2230" },
  statLabel: { fontSize: 10, color: "#6B7686" },
  statValue: { fontSize: 13, marginTop: 2 },
  catalyst: { fontSize: 11.5, lineHeight: 1.5, color: "#9AA3B2", marginTop: 12, paddingTop: 12, borderTop: "1px solid #1C2230" },
  alertBox: { marginTop: 12 },
  alertRow: { display: "flex", gap: 6, alignItems: "center" },
  alertToggle: { fontSize: 11, display: "flex", alignItems: "center", gap: 4, color: "#8A93A3" },
  select: { background: "#151A24", border: "1px solid #262E3D", color: "#E8EAED", borderRadius: 6, fontSize: 12, padding: "4px 6px" },
  numInput: { flex: 1, minWidth: 0, background: "#151A24", border: "1px solid #262E3D", color: "#E8EAED", borderRadius: 6, fontSize: 12, padding: "4px 8px", fontFamily: "inherit" },
  alertFired: { fontSize: 11.5, marginTop: 8, fontWeight: 600 },
  footerGrid: { display: "grid", gridTemplateColumns: "minmax(220px,1fr) minmax(220px,1.4fr)", gap: 16 },
  linksCard: { background: "#10141C", border: "1px solid #1C2230", borderRadius: 12, padding: 16 },
  noteCard: { background: "#10141C", border: "1px solid #1C2230", borderRadius: 12, padding: 16 },
  cardHeading: { fontFamily: "'Space Grotesk', sans-serif", fontSize: 13, fontWeight: 700, marginBottom: 10, color: "#C9CFDA" },
  linksList: { display: "flex", flexDirection: "column", gap: 8 },
  link: { color: "#2DE0C6", fontSize: 12.5 },
  note: { fontSize: 12, lineHeight: 1.6, color: "#8A93A3", margin: 0 },
};

ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard />);
</script>
</body>
</html>
